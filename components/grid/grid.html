<!--
  GRID & FLEX — Exemples d'utilisation
  ═══════════════════════════════════════════════════

  RÈGLE DA :
  • 2 concepts à comparer     → .grid-2 + align-items:start
  • 4 cards (2×2)             → .grid-2 avec 2 .flex-col à l'intérieur
  • 3+ outils côte à côte     → .flex-row
  • Listing d'étapes vertical → .flex-col
  • Jamais de sibling <section> sans wrapper (navigation horizontale)

  ───────────────────────────────────────────────────
  A) 2 colonnes — comparaison (grid-2)
  ───────────────────────────────────────────────────
-->
<div class="grid-2" style="align-items: start;">
  <div class="card" style="border-left: 4px solid var(--color-terracotta);">
    <strong style="color: var(--color-terracotta);">Concept A</strong>
    <p style="color: var(--color-charcoal); margin-top: var(--margin-sm);">Description du premier concept.</p>
  </div>
  <div class="card" style="border-left: 4px solid var(--color-green);">
    <strong style="color: var(--color-green);">Concept B</strong>
    <p style="color: var(--color-charcoal); margin-top: var(--margin-sm);">Description du second concept.</p>
  </div>
</div>

<!--
  B) 4 cards (2×2) — grid-2 avec 2 flex-col
-->
<div class="grid-2" style="align-items: stretch;">
  <div class="flex-col">
    <div class="card" style="border-left: 4px solid var(--color-terracotta);">
      <strong style="color: var(--color-terracotta);">Card 1</strong>
      <p style="color: var(--color-charcoal); margin-top: var(--margin-sm);">Contenu</p>
    </div>
    <div class="card" style="border-left: 4px solid var(--color-blue);">
      <strong style="color: var(--color-blue);">Card 2</strong>
      <p style="color: var(--color-charcoal); margin-top: var(--margin-sm);">Contenu</p>
    </div>
  </div>
  <div class="flex-col">
    <div class="card" style="border-left: 4px solid var(--color-green);">
      <strong style="color: var(--color-green);">Card 3</strong>
      <p style="color: var(--color-charcoal); margin-top: var(--margin-sm);">Contenu</p>
    </div>
    <div class="card" style="border-left: 4px solid var(--color-amber);">
      <strong style="color: var(--color-amber);">Card 4</strong>
      <p style="color: var(--color-charcoal); margin-top: var(--margin-sm);">Contenu</p>
    </div>
  </div>
</div>

<!--
  C) 3 outils côte à côte — flex-row (border-top)
-->
<div class="flex-row">
  <div class="card" style="border-top: 4px solid var(--color-terracotta);">
    <p style="font-weight: 700; color: var(--color-charcoal);">Outil A</p>
    <p style="color: var(--color-charcoal); margin-top: var(--margin-xs);">Description.</p>
  </div>
  <div class="card" style="border-top: 4px solid var(--color-blue);">
    <p style="font-weight: 700; color: var(--color-charcoal);">Outil B</p>
    <p style="color: var(--color-charcoal); margin-top: var(--margin-xs);">Description.</p>
  </div>
  <div class="card" style="border-top: 4px solid var(--color-green);">
    <p style="font-weight: 700; color: var(--color-charcoal);">Outil C</p>
    <p style="color: var(--color-charcoal); margin-top: var(--margin-xs);">Description.</p>
  </div>
</div>

<!--
  D) Stack vertical — listing d'étapes (flex-col)
-->
<div class="flex-col">
  <div class="card" style="border-left: 4px solid var(--color-terracotta);">
    <strong style="color: var(--color-terracotta);">Étape 1</strong>
    <p style="color: var(--color-charcoal); margin-top: var(--margin-sm);">Description.</p>
  </div>
  <div class="card" style="border-left: 4px solid var(--color-terracotta);">
    <strong style="color: var(--color-terracotta);">Étape 2</strong>
    <p style="color: var(--color-charcoal); margin-top: var(--margin-sm);">Description.</p>
  </div>
</div>
